<div class="banner">
    <div class="container">
        <div class="banner-container">
            <div class="text-side">
                <div class="text">
                    <h2>{{title}}</h2>
                    <p>{{text}}</p>
                    <a href="/categories/all">
                        <button>Shop Now</button>
                    </a>
                </div>
            </div>
            <div class="img-side">
                <img [src]="img" alt="banner" />
            </div>
        </div>
    </div>
</div>
